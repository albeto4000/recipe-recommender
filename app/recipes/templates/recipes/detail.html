<!DOCTYPE html>
<html>
	<head>
		<title></title>
	</head>
	<body>
		<h1>{{ recipe.name }}</h1>
			<div>{{ recipe.description }}</div>
			<h2>Ingredients</h2>
			<ul>
				{% for ingredient in ingredients %}
				<li>{{ ingredient }}</li>

				{% endfor %}
			</ul>
			<h2>Steps</h2>
			<ol>
				{% for step in steps %}
				<li>{{ step }}</li>
				{% endfor %}
			</ol>
	</body>
</html>
