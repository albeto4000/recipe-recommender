<div class="bg-dark">
	<div class="container py-4">
		<div class="row d-flex justify-content-center">
			<div class="col col-6">
				<h3 class="text-light text-center pb-2">Find More Recipes</h3>
				<form action="{% url 'recipes:browse' %}" class="d-flex" role="search" method="get">
					<input class="form-control me-2" type="search" name="query" value="{{ query|default:'' }}" placeholder="How do I make..." aria-label="Search"/>
					<button class="btn btn-outline-success" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
				</form>
			</div>
		</div>
	</div>
</div>
